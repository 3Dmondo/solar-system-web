name: Deploy To GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EPHEMERIS_DATA_RELEASE_TAG: ephemeris-expanded-major-moons-targeted-4-samples-v1
  EPHEMERIS_DATA_ASSET_NAME: ephemeris-expanded-major-moons-targeted-4-samples-v1.zip
  EPHEMERIS_DATA_ALLOW_FAST_MOONS: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ephemeris assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/ephemeris-release public/ephemeris/generated
          gh release download "$EPHEMERIS_DATA_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$EPHEMERIS_DATA_ASSET_NAME" \
            --dir .tmp/ephemeris-release
          find public/ephemeris/generated -maxdepth 1 -type f -name '*.json' -delete
          unzip -q ".tmp/ephemeris-release/$EPHEMERIS_DATA_ASSET_NAME" -d public/ephemeris/generated
          test -f public/ephemeris/generated/manifest.json
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('public/ephemeris/generated/manifest.json','utf8')); const blocked=new Set([401,402,501,502,601,602,603,604,701,705]); const allowFastMoons=String(process.env.EPHEMERIS_DATA_ALLOW_FAST_MOONS).toLowerCase()==='true'; const ids=(manifest.Bodies||[]).map((body)=>Number(body.BodyId)); const bad=ids.filter((id)=>blocked.has(id)); if (bad.length && !allowFastMoons) { throw new Error('Release ephemeris asset includes deferred fast moon ids: '+bad.join(', ')); } console.log('Loaded release ephemeris body count:', ids.length, 'fast moons:', bad.length ? bad.join(', ') : 'none');"

      - name: Build site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
